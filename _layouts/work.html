<!DOCTYPE html>
<html lang="ja" prefix="og:http://ogp.me/ns#">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>METALITY UNITED - {{ page.title }}</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000">
  <meta name="description" content="{{ page.description }}">
  <meta property="og:title" content="METALITY UNITED - {{ page.title }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://metality.band{{ page.url }}" />
  <meta property="og:image" content="https://metality.band/images/logo-band-ogp.png" />
  <meta property="og:description" content="{{ page.description }}" />
  <meta property="og:site_name" content="METALITY UNITED" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@metality_united" />

  <link rel="stylesheet" href="https://unpkg.com/destyle.css@3.0.2/destyle.min.css">
  <script src="https://kit.fontawesome.com/d925e0b3e6.js" crossorigin="anonymous"></script>
  <link href="https://use.fontawesome.com/releases/v6.4.2/css/all.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/icon/favicon.ico">
  <link rel="icon" sizes="192x192" href="/icon/android-chrome-192x192.png">
</head>

<body>
  <!-- 背景 -->
  <div class="background">
    <!--コンテンツ-->
    <div class="container">
      {% include header.html %}
    </div><!--コンテンツ一旦ここまで-->

    <!-- ビジュアル・タイトル-->
    <div class="music">
      <div class="container">
        <div class="music-introduction">
          <div class="music-copy">{{ page.copy }}</div>
          <div class="music-illustration">
            <img src="{{ page.imageUrl }}" alt="{{ page.title }}メインビジュアル" />
          </div>
          <div class="{{ page.titleClass }}">{{ page.title }}</div>
        </div>
      </div>
    </div>

    <div class="container">
      {{ content }}
    </div><!-- コンテンツここまで -->

    <!-- 動画リンク-->
    <div class="under-background">
      <!--コンテンツ-->
      <div class="container">
        <div class="youtube" id="youtube">
          <iframe width="100%" height="100%" src="{{ page.youtube }}"
            title="{{ page.title }} - METALITY UNITED" frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
      </div>

      <!-- TOPに戻るアイコン -->
      <a href="#top">
        <div class="top-icon">
          <i class="fa-solid fa-circle-chevron-up iconsize"></i>
        </div>
      </a>

    </div><!-- 火の粉背景 -->

    {% include footer.html %}
  </div><!-- 背景ここまで -->
</body>

</html>
